services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: biq
      POSTGRES_PASSWORD: biq
      POSTGRES_DB: benefitiq
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biq"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  api:
    build: ../backend
    env_file: ../.env.example
    environment:
      BIQ_DATABASE_URL: postgresql+psycopg2://biq:biq@postgres:5432/benefitiq
      BIQ_STORAGE_BACKEND: s3
      BIQ_S3_ENDPOINT: http://minio:9000
    depends_on: [postgres, minio]
    ports: ["8000:8000"]

volumes:
  pgdata: {}
  miniodata: {}
