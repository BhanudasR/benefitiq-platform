# Render Blueprint — BenefitIQ PILOT deployment (masked / synthetic data only).
# This is a convenience starting point; DEPLOYMENT.md is the authoritative click-by-click guide
# (Render's Blueprint schema occasionally changes — the dashboard steps are version-proof).
#
# SECRETS ARE NEVER IN THIS FILE. JWT is generated by Render; the DB URL is injected from the
# managed database; S3 keys + CORS origin are marked `sync: false` and entered in the dashboard.

databases:
  - name: benefitiq-db
    databaseName: benefitiq
    user: biq
    plan: free            # pilot only (Render free Postgres expires ~90 days); upgrade for real use

services:
  # ---- Backend API (Docker) ----
  - type: web
    name: benefitiq-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BIQ_ENV
        value: production
      - key: BIQ_AUTO_CREATE_TABLES
        value: "false"                 # prod schema comes ONLY from `alembic upgrade head`
      - key: BIQ_DATABASE_URL
        fromDatabase:
          name: benefitiq-db
          property: connectionString   # injected by Render; not stored here
      - key: BIQ_JWT_SECRET
        generateValue: true            # Render generates a strong random secret
      - key: BIQ_STORAGE_BACKEND
        value: s3
      - key: BIQ_S3_ENDPOINT
        sync: false                    # set in dashboard (S3-compatible endpoint)
      - key: BIQ_S3_BUCKET
        sync: false
      - key: BIQ_S3_ACCESS_KEY
        sync: false                    # secret — dashboard only
      - key: BIQ_S3_SECRET_KEY
        sync: false                    # secret — dashboard only
      - key: BIQ_S3_REGION
        sync: false
      - key: BIQ_CORS_ORIGINS
        sync: false                    # set to the benefitiq-web URL AFTER the static site exists

  # ---- Frontend SPA (static) ----
  - type: web
    name: benefitiq-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        sync: false                    # set to the benefitiq-api HTTPS URL BEFORE building
    routes:
      - type: rewrite
        source: /*
        destination: /index.html       # SPA deep-link fallback (also covered by public/_redirects)
